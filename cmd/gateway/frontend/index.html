<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SRC-Web Gateway</title>
<style>
:root{--bg:#0a0a0f;--bar:#12121a;--text:#8b8b9e;--accent:#00e676;--danger:#ff5252;--btn:#1a1a2e;--btn-hover:#252540;--border:#1e1e32}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font:12px/1.4 "Inter","Segoe UI",system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

#bar{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:6px 14px;background:var(--bar);border-bottom:1px solid var(--border);user-select:none}
#bar .brand{color:#fff;font-weight:600;letter-spacing:-0.3px;margin-right:4px}
#bar .status{width:7px;height:7px;border-radius:50%;background:var(--danger)}
#bar .status.live{background:var(--accent);box-shadow:0 0 6px var(--accent)}
#bar .stat{color:var(--text);font-size:11px}
#bar .stat strong{color:#ccc;font-weight:500}
#bar .sep{width:1px;height:18px;background:var(--border)}
#bar button{background:var(--btn);color:#bbb;border:1px solid var(--border);padding:4px 10px;border-radius:4px;cursor:pointer;font:11px system-ui;transition:all .15s}
#bar button:hover{background:var(--btn-hover);border-color:#444;color:#fff}
#bar button.on{background:#0d3314;border-color:var(--accent);color:var(--accent)}
#bar button.danger{background:#2d1010;border-color:var(--danger);color:var(--danger)}
#bar .hint{color:#555;font-size:10px;margin-left:auto}

#view{flex:1;position:relative;display:flex;justify-content:center;align-items:center;background:#000}
#stream{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;cursor:crosshair;display:block;background:#000}
#cur{position:absolute;width:14px;height:14px;border:2px solid var(--accent);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);opacity:0;z-index:10;transition:opacity .08s}
#cur.on{opacity:1;box-shadow:0 0 8px var(--accent)}
#ripple{position:absolute;pointer-events:none;z-index:9}
#ripple div{position:absolute;border:2px solid var(--accent);border-radius:50%;transform:translate(-50%,-50%);animation:rip .35s ease-out forwards}
@keyframes rip{0%{width:8px;height:8px;opacity:.8}100%{width:56px;height:56px;opacity:0}}
#toast{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:var(--accent);font:11px monospace;padding:3px 10px;border-radius:3px;pointer-events:none;opacity:0;transition:opacity .2s}
#toast.show{opacity:1}
</style>
</head>
<body>
<header id="bar">
  <span class="brand">SRC-Web</span>
  <span id="dot" class="status"></span>
  <span class="stat"><strong id="fps">--</strong> fps</span>
  <span class="sep"></span>
  <span class="stat">📐 <strong id="pos">--</strong></span>
  <span class="sep"></span>
  <button id="sbtn" onclick="togSwipe()">↔ 滑动</button>
  <button onclick="cmd('dismiss')" class="danger">✕ 弹窗</button>
  <button onclick="cmd('key','','','','','','Escape')">Esc</button>
  <span class="sep"></span>
  <span class="hint">点击画面 · 键盘输入</span>
</header>

<main id="view">
  <img id="stream" src="/stream" alt="game">
  <div id="cur"></div>
  <div id="ripple"></div>
  <div id="toast"></div>
</main>

<script>
const W=1280,H=720;
var swiping=false,swS=null,ws=null,rTimer=null,frames=0,lastFps=0;
const im=document.getElementById("stream"),vw=document.getElementById("view"),
  cur=document.getElementById("cur"),pos=document.getElementById("pos"),
  ripEl=document.getElementById("ripple"),toast=document.getElementById("toast"),
  fpsEl=document.getElementById("fps"),dot=document.getElementById("dot"),
  sbtn=document.getElementById("sbtn");

// ─── Coordinate mapping (corrected for object-fit:contain) ───
function gc(e){
  const r=im.getBoundingClientRect(),iw=W,ih=H;
  const scale=Math.min(r.width/iw,r.height/ih);
  const dw=iw*scale,dh=ih*scale;
  const ox=(r.width-dw)/2,oy=(r.height-dh)/2;
  return{
    x:Math.round(Math.max(0,Math.min(iw,(e.clientX-r.left-ox)/scale))),
    y:Math.round(Math.max(0,Math.min(ih,(e.clientY-r.top-oy)/scale)))
  };
}

function show(msg){toast.textContent=msg;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),1200);}

// ─── WebSocket ───
function connect(){
  try{ws?.close()}catch(_){}
  ws=new WebSocket("ws://"+location.host+"/ws");
  ws.onopen=()=>{dot.classList.add("live");};
  ws.onclose=()=>{dot.classList.remove("live");clearTimeout(rTimer);rTimer=setTimeout(connect,1500);};
  ws.onerror=()=>ws.close();
}
connect();
setInterval(()=>{if(ws?.readyState===WebSocket.OPEN)ws.send(JSON.stringify({type:"ping"}))},15000);

function cmd(type,x,y,x1,y1,x2,y2,key){
  if(!ws||ws.readyState!==WebSocket.OPEN){connect();show("⟳ 重连中");return;}
  const m={type};
  if(type==="click"){m.x=x;m.y=y}
  else if(type==="swipe"){m.x1=x1;m.y1=y1;m.x2=x2;m.y2=y2}
  else if(type==="key")m.key=key;
  ws.send(JSON.stringify(m));
}

// ─── Mouse ───
vw.addEventListener("mousemove",e=>{
  const g=gc(e),r=vw.getBoundingClientRect();
  cur.style.left=(e.clientX-r.left)+"px";
  cur.style.top=(e.clientY-r.top)+"px";
  if(g.x>=0&&g.y>=0&&g.x<=W&&g.y<=H){cur.classList.add("on");pos.textContent=g.x+", "+g.y;}
  else cur.classList.remove("on");
});
vw.addEventListener("mouseleave",()=>cur.classList.remove("on"));

vw.addEventListener("click",e=>{
  if(swiping)return;
  const g=gc(e);if(g.x<0||g.y<0||g.x>W||g.y>H)return;
  // Ripple
  const d=document.createElement("div"),r=vw.getBoundingClientRect();
  d.style.left=(e.clientX-r.left)+"px";d.style.top=(e.clientY-r.top)+"px";
  ripEl.appendChild(d);setTimeout(()=>d.remove(),400);
  cmd("click",g.x,g.y);show(`点击 (${g.x}, ${g.y})`);
});

// ─── Swipe ───
function togSwipe(){swiping=!swiping;sbtn.classList.toggle("on",swiping);}
vw.addEventListener("mousedown",e=>{if(!swiping)return;swS=gc(e);show(`滑动起点 (${swS.x}, ${swS.y})`);});
vw.addEventListener("mouseup",e=>{
  if(!swiping||!swS)return;const g=gc(e);
  if(Math.abs(g.x-swS.x)<6&&Math.abs(g.y-swS.y)<6)cmd("click",g.x,g.y);
  else cmd("swipe",0,0,swS.x,swS.y,g.x,g.y);
  swS=null;
});

// ─── Keyboard ───
document.addEventListener("keydown",e=>{if(e.target.tagName==="BUTTON")return;cmd("key","","","","","",e.key);e.preventDefault();});

// ─── FPS ───
im.addEventListener("load",()=>{
  frames++;
  const n=performance.now();
  if(!lastFps)lastFps=n;
  if(n-lastFps>=1000){fpsEl.textContent=Math.round(frames/((n-lastFps)/1000));frames=0;lastFps=n;}
});
</script>
</body>
</html>
